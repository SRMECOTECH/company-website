<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#060911" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F8FAFC" />
    <meta name="description" content="SRM ECO TECH — Smart IT, sustainable compliance. AI/ML, GPS analytics, data lakes and EPR compliance, engineered for production." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>SRM ECO TECH — Smart IT, Sustainable Compliance</title>
    <!-- Set theme before paint to avoid FOUC -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('srmtheme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
